<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="./styles/styles.css">
  
  <title>Frontend Mentor | Frontend quiz app</title>
</head>
<body>

  <!-- Quiz menu start -->

  Welcome to the Frontend Quiz!
  Pick a subject to get started.

  HTML
  CSS
  JavaScript
  Accessibility

  <!-- Quiz menu end -->

  <!-- Quiz question start -->

  Question <!-- number --> of 10

  A
  B
  C
  D

  Submit answer

  <!-- Quiz question end -->

  <!-- Quiz completed start -->

  Quiz completed
  You scored...

  <!-- score --> out of 10

  <!-- Quiz completed end -->
     <div class="question__container">
    <div class="question__number">
      <p>Question 6 of 10</p>
    </div>
    <div class="question__display">
      <p>
        Which of theese color contrast ratios defines the minimum
        wcag 2.1 level aa requirement for normal text?
      </p>
    </div>
    <div class="question__progress">
      <div class="progress__bar"></div>
    </div>
  </div>

  <label>
    <div>
      <p>A</p>
    </div>
    <p class="answer__choices">4.5:1</p>
  </label>
  <input type="radio" name="" id="">

   <label>
    <div>
      <p>B</p>
    </div>
    <p class="answer__choices">4.5:1</p>
  </label>
  <input type="radio" name="" id="">

   <label>
    <div>
      <p>C</p>
    </div>
    <p class="answer__choices">4.5:1</p>
  </label>
  <input type="radio" name="" id="">

   <label>
    <div>
      <p>D</p>
    </div>
    <p class="answer__choices">4.5:1</p>
  </label>
  <input type="radio" name="" id="">

  <button id="html" value="html">HTML</button>
  <button id="css" value="css">CSS</button>
  <button id="javascript" value="javascript">JavaScript</button>
  <button id="accessibility" value="accessibility">Accessibility</button>

  <script src="./scripts/renderQuiz.js"></script>
  <script src="./scripts/fetchQuiz.js"></script>
</body>
</html>
