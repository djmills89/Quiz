<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles/styles.css">
  
  <title>Frontend Mentor | Frontend quiz app</title>
</head>
<body>
  <main>
    <article>
      <header>
        <div class="toggle">
          <div class="toggle__container">
            <img src="./assets/images/icon-sun-dark.svg" alt="Light mode icon">
            <div class="toggle__element">
              <div class="toggle__control"></div>
            </div>
            <img src="./assets/images/icon-moon-dark.svg" alt="Dark mode icon">
          </div>
        </div>
        <div class="title">
          <h1>Welcome to the <span class="font__bold">Frontend Quiz</span></h1>
          <p>Pick a subject and get started</p>
        </div>
        <div class="question__container hide__content">
          <div class="question__number">
            <p></p>
          </div>
          <div class="question__display">
          <p></p>
          </div>
          <div class="question__progress">
            <div class="progress__bar"></div>
          </div>
        </div>
      </header>

      <div class="subjects">

        <div class="subjects__choice html__option">
          <button class="subjects__button" id="html" value="html">
            <div class="html__icon">
              <img src="./assets/images/icon-html.svg" alt="HTML Icon">
            </div>
            <p>HTML</p>
          </button>
        </div>

        <div class="subjects__choice css__option">
          <button class="subjects__button" id="css" value="css">
            <div class="css__icon">
              <img src="./assets/images/icon-css.svg" alt="CSS Icon">
            </div>
            <p>CSS</p>
          </button>
        </div>

        <div class="subjects__choice javascript__option">
          <button class="subjects__button" id="javascript" value="javascript">
            <div class="javascript__icon">
              <img src="./assets/images/icon-js.svg" alt="Javascript Icon">
            </div>
            <p>JavaScript</p>
          </button>
        </div>

        <div class="subjects__choice accessibility__option">
          <button class="subjects__button" id="accessibility" value="accessibility">
            <div class="accessibility__icon">
              <img src="./assets/images/icon-accessibility.svg" alt="Accessibility Icon">
            </div>
            <p>Accessibility</p>
          </button>
        </div>

      </div>     
    </article>


    <form>
      <label>
        <div class="answer__options">
          <p>A</p>
        </div>
          <p class="answer__choices">4.5:1</p>
      </label>
      <input type="radio" name="" id="">

      <label>
        <div class="answer__options">
          <p>B</p>
        </div>
          <p class="answer__choices">4.5:1</p>
      </label>
      <input type="radio" name="" id="">

      <label>
        <div class="answer__options">
          <p>C</p>
        </div>
          <p class="answer__choices">4.5:1</p>
      </label>
      <input type="radio" name="" id="">

      <label>
        <div class="answer__options">
          <p>D</p>
        </div>
          <p class="answer__choices">4.5:1</p>
      </label>
      <input type="radio" name="" id="">

    </form>
  </main>

  
  
  
  
<script src="./scripts/toggle.js"></script>
<script src="./scripts/renderQuiz.js"></script>
<script src="./scripts/fetchQuiz.js"></script>
</body>
</html>
